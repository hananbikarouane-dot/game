name: Run Blogger XML Generator

# تحديد متى يشتغل السكربت (عند رفع كود جديد، أو بشكل يدوي، أو بجدولة زمنية)
on:
  push:
    branches:
      - main
  workflow_dispatch: # يتيح لك تشغيل السكربت يدوياً بضغطة زر من الموقع

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب الملفات من المستودع إلى السيرفر الافتراضي
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. تثبيت لغة بايثون على السيرفر
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. تثبيت المكتبات البرمجية المطلوبة
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests beautifulsoup4

    # 4. تشغيل السكربت لتوليد الملف
    - name: Run Script
      run: python generate_blogger_xml.py

    # 5. حفظ الملف الناتج (XML) وإعادة رفعه إلى مستودعك تلقائياً
    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add blogger_import_lap_products.xml
        git diff --quiet && git diff --staged --quiet || (git commit -m "تحديث تلقائي لملف المنتجات" && git push)
