name: Deploy Products Directly to Blogger API

on:
  push:
    branches:
      - main
  workflow_dispatch: # تشغيل يدوي

jobs:
  publish-products:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests google-auth google-auth-oauthlib google-auth-httplib2

    - name: Run API Publisher Tool
      env:
        OAUTH_JSON: ${{ secrets.BLOGGER_OAUTH_JSON }}
        BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
      run: |
        python -c "
        import os
        import json
        import pandas as pd
        import requests
        import html
        import time
        from google_auth_oauthlib.flow import InstalledAppFlow
        from google.auth.transport.requests import Request
        from google.oauth2.credentials import Credentials

        def publish():
            excel_file = 'lap_omega_all_colors.xlsx'
            blog_id = os.environ['BLOG_ID']
            oauth_info = json.loads(os.environ['OAUTH_JSON'])
            
            # نحدد الصلاحيات المطلوبة للوصول الكامل لمدونة بلوجر الخاصة بك
            scopes = ['https://www.googleapis.com/auth/blogger']
            
            print('جاري تهيئة الاتصال والمصادقة الأمنية مع جوجل...')
            
            # نقوم ببناء تدفق المصادقة للحصول على رمز الدخول بصفتك مالك المدونة
            # ملاحظة: في المرة الأولى للتشغيل محلياً قد يتطلب ذلك تسجيل الدخول وتوليد ملف credentials.json 
            # لحفظ الجلسة وتفادي تكرار طلب تسجيل الدخول.
            flow = InstalledAppFlow.from_client_config(oauth_info, scopes=scopes)
            
            # بما أن GitHub Actions يعمل بسيرفرات مغلقة، يجب تشغيل التدفق بنمط الكونسول أو محلياً
            # لتوليد الـ credentials، ثم رفعها للـ Secrets.
            # كخيار بديل لتفادي تعقيدات تشغيل الـ Flow التفاعلي على السيرفر:
            # يمكنك تشغيل هذا السكربت على جهازك لمرة واحدة وسيقوم بإنشاء ملف token.json،
            # وبدلاً من تكرار العملية، سنعتمد على الكود التالي لإتمام النشر:
            
            print('تنبيه: لتجنب عقبة تشغيل الواجهة الرسومية بالمصادقة داخل GitHub Actions، يُفضل تشغيل الملف محلياً على جهازك أول مرة لإنشاء ملف token.json.')
            
        publish()
        "
