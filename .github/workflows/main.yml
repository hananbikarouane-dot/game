name: Auto Publish Products to Blogger

on:
  push:
    paths:
      - 'lap_omega_all_colors.xlsx'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl google-api-python-client google-auth-httplib2

    - name: Run Publisher Script
      env:
        BLOG_ID: ${{ secrets.BLOG_ID }}
        BLOGGER_TOKEN: ${{ secrets.BLOGGER_TOKEN }}
      run: python publish_from_excel.py
