name: Blogger API Diagnostics Tool

on:
  workflow_dispatch: # تشغيل يدوي

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-auth google-auth-oauthlib

    - name: Run Diagnostics
      env:
        TOKEN_JSON: ${{ secrets.BLOGGER_TOKEN_JSON }}
        BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
      run: |
        python -c "
        import os
        import json
        import requests
        from google.oauth2.credentials import Credentials
        from google.auth.transport.requests import Request

        def run_tests():
            blog_id = os.environ.get('BLOG_ID', '').strip()
            token_env = os.environ.get('TOKEN_JSON', '').strip()
            
            print('=== 🧪 1. فحص المتغيرات الأساسية ===')
            print('رقم المدونة المستهدف (BLOG_ID): ' + str(blog_id))
            if not blog_id:
                print('❌ خطأ: رقم المدونة فارغ في الـ Secrets!')
                return
            
            try:
                token_info = json.loads(token_env)
                print('✅ تم تحميل الـ Token JSON بنجاح من الـ Secrets.')
            except Exception as e:
                print('❌ خطأ: فشل قراءة الـ Token JSON! تأكد من نسخ النص بالكامل: ' + str(e))
                return

            print('\n=== 🧪 2. تجديد الـ Token ===')
            try:
                creds = Credentials(
                    token=token_info.get('token'),
                    refresh_token=token_info.get('refresh_token'),
                    token_uri=token_info.get('token_uri'),
                    client_id=token_info.get('client_id'),
                    client_secret=token_info.get('client_secret'),
                    scopes=['https://www.googleapis.com/auth/blogger']
                )
                creds.refresh(Request())
                print('✅ تم تجديد الصلاحية بنجاح.')
            except Exception as e:
                print('❌ فشل تجديد الـ Token: ' + str(e))
                return

            access_token = creds.token
            headers = {'Authorization': 'Bearer ' + access_token}

            print('\n=== 🧪 3. فحص معلومات الحساب والمدونات المتاحة له ===')
            list_url = 'https://www.googleapis.com/blogger/v3/users/self/blogs'
            try:
                res = requests.get(list_url, headers=headers)
                if res.status_code == 200:
                    blogs_data = res.json()
                    print('✅ نجح الاتصال بجوجل! الحساب الحالي لديه صلاحية على المدونات التالية:')
                    found = False
                    for b in blogs_data.get('items', []):
                        is_target = '⭐ (المدونة المستهدفة حالياً)' if str(b.get('id')) == blog_id else ''
                        print('- اسم المدونة: ' + str(b.get('name')) + ' | المعرف (ID): ' + str(b.get('id')) + ' ' + is_target)
                        if str(b.get('id')) == blog_id:
                            found = True
                    
                    if not found:
                        print('⚠️ تحذير: المدونة المستهدفة (' + blog_id + ') ليست من ضمن المدونات التي يمتلك الحساب صلاحية عليها!')
                else:
                    print('❌ فشل جلب قائمة المدونات المتاحة للحساب. كود الخطأ: ' + str(res.status_code))
                    print(res.text)
            except Exception as e:
                print('❌ حدث خطأ أثناء الاتصال: ' + str(e))

            print('\n=== 🧪 4. فحص الصلاحية المباشرة للمدونة ===')
            blog_url = 'https://www.googleapis.com/blogger/v3/blogs/' + blog_id
            try:
                res = requests.get(blog_url, headers=headers)
                if res.status_code == 200:
                    print('✅ الحساب الحالي لديه صلاحية قراءة كاملة على المدونة المستهدفة!')
                    print('اسم المدونة المستهدفة الفعلي: ' + str(res.json().get('name')))
                else:
                    print('❌ لا توجد صلاحية مباشرة على هذه المدونة المحددة. كود الخطأ: ' + str(res.status_code))
                    print(res.text)
            except Exception as e:
                print('❌ حدث خطأ أثناء محاولة جلب بيانات المدونة: ' + str(e))

        run_tests()
        "
