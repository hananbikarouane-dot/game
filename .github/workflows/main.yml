name: Deploy Products Directly to Blogger API

on:
  push:
    branches:
      - main
  workflow_dispatch: # تشغيل يدوي

jobs:
  publish-products:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests google-auth google-auth-oauthlib

    - name: Run Diagnostic & Publisher Tool
      env:
        TOKEN_JSON: ${{ secrets.BLOGGER_TOKEN_JSON }}
        BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
      run: |
        python -c "
        import os
        import json
        import pandas as pd
        import requests
        import html
        import time
        from google.oauth2.credentials import Credentials
        from google.auth.transport.requests import Request

        def publish():
            excel_file = 'lap_omega_all_colors.xlsx'
            blog_id = os.environ['BLOG_ID'].strip()
            
            print('=== 🔍 1. فحص وتحليل بيئة العمل والمتغيرات ===')
            print('مُعرّف المدونة المستهدف (BLOG_ID): ' + blog_id)
            
            try:
                token_info = json.loads(os.environ['TOKEN_JSON'])
                print('✅ تم تحميل ملف الـ Token JSON بنجاح.')
            except Exception as e:
                print('❌ فشل قراءة الـ Token JSON! تأكد من وجوده في الـ Secrets بصيغة سليمة: ' + str(e))
                return
            
            # بناء كائن الـ Credentials
            creds = Credentials(
                token=token_info.get('token'),
                refresh_token=token_info.get('refresh_token'),
                token_uri=token_info.get('token_uri'),
                client_id=token_info.get('client_id'),
                client_secret=token_info.get('client_secret'),
                scopes=['https://www.googleapis.com/auth/blogger']
            )
            
            print('\n=== 🔄 2. محاولة تجديد الـ Token والحصول على معلومات الحساب ===')
            try:
                creds.refresh(Request())
                print('✅ تم تجديد صلاحية الدخول بنجاح.')
            except Exception as refresh_err:
                print('❌ فشل تجديد الصلاحية تلقائياً: ' + str(refresh_err))
                return

            access_token = creds.token
            headers = {
                'Authorization': 'Bearer ' + access_token,
                'Content-Type': 'application/json'
            }

            # اختبار الحساب النشط ومستوى الصلاحية الممنوح للتطبيق من جوجل
            print('\n=== 🔬 3. استجواب خوادم جوجل عن الصلاحية النشطة ومستوى الوصول ===')
            tokeninfo_url = 'https://oauth2.googleapis.com/tokeninfo?access_token=' + access_token
            try:
                info_res = requests.get(tokeninfo_url)
                if info_res.status_code == 200:
                    info_data = info_res.json()
                    print('✅ معلومات الـ Token المستخرج حالياً:')
                    print('- البريد الإلكتروني النشط (Email): ' + str(info_data.get('email')))
                    print('- نطاق الصلاحيات الممنوح فعلياً (Scope): ' + str(info_data.get('scope')))
                    
                    # التحقق الفعلي من وجود صلاحية الكتابة (blogger) وليس القراءة فقط (blogger.readonly)
                    actual_scopes = info_data.get('scope', '')
                    if 'blogger' in actual_scopes and 'readonly' not in actual_scopes:
                        print('⚠️ تنبيه الصلاحيات: الـ Scope الممنوح هو للقراءة والكتابة.')
                    else:
                        print('⚠️ تحذير الصلاحيات: الـ Token قد يكون محدود الصلاحية بالقراءة فقط!')
                else:
                    print('❌ فشل استجواب معلومات الـ Token من جوجل: ' + info_res.text)
            except Exception as e:
                print('❌ خطأ أثناء محاولة استجواب الـ Token: ' + str(e))

            print('\n=== 📋 4. قراءة ملف الإكسل ===')
            try:
                df = pd.read_excel(excel_file)
                print('✅ تم قراءة ملف الإكسل بنجاح. عدد المنتجات: ' + str(len(df)))
            except Exception as e:
                print('❌ خطأ في قراءة ملف الإكسل: ' + str(e))
                return

            url = 'https://www.googleapis.com/blogger/v3/blogs/' + blog_id + '/posts'
            
            default_price = '150'
            default_category = 'protection'

            print('\n=== 🚀 5. بدء محاكاة واختبار الرفع مع تحليل دقيق للمشكلة ===')
            for index, row in df.iterrows():
                title = str(row.get('اسم المنتج (Title)', 'منتج بدون اسم')).strip()
                color = str(row.get('اللون (Color)', 'أساسي')).strip()
                ref = str(row.get('المرجع (SKU / Ref)', 'غير متوفر')).strip()
                img_url = str(row.get('رابط الصورة (Image URL)', '')).strip()
                desc = str(row.get('الوصف والمواصفات (Description)', 'لا توجد تفاصيل إضافية.')).strip()
                
                full_title = title + ' - ' + color
                
                post_content = ''
                if img_url:
                    post_content = post_content + '<img src=\'' + html.escape(img_url) + '\' />\n'
                
                post_content = post_content + '<p>التصنيف: ' + default_category + '</p>\n'
                post_content = post_content + '<p>الماركة: lap</p>\n'
                post_content = post_content + '<p>اللون: ' + color + '</p>\n'
                post_content = post_content + '<p>المرجع: ' + ref + '</p>\n'
                post_content = post_content + '<p>السعر الإجمالي: ' + default_price + '</p>\n'
                post_content = post_content + '<p>' + html.escape(desc) + '</p>'

                payload = {
                    'kind': 'blogger#post',
                    'title': full_title,
                    'content': post_content,
                    'status': 'DRAFT',
                    'labels': [default_category]
                }
                
                print('\n--- 📦 محاولة رفع المنتج: ' + full_title + ' ---')
                
                try:
                    response = requests.post(url, json=payload, headers=headers)
                    if response.status_code == 200 or response.status_code == 201:
                        print('✅ تم رفع المنتج بنجاح كمسودة!')
                    else:
                        print('❌ فشل الرفع. كود الخطأ: ' + str(response.status_code))
                        print('=== [تفاصيل الاستجابة للخطأ] ===')
                        print('محتوى الخطأ من جوجل: ' + response.text)
                        print('رؤوس طلب الاستجابة (Response Headers):')
                        # طباعة الـ Headers التي ترسلها جوجل لأنها تحتوي على سبب الرفض الدقيق
                        for key, val in response.headers.items():
                            print('- ' + key + ': ' + val)
                        print('=================================')
                        
                        # إيقاف فوري للتشخيص بعد أول خطأ لمنع تكرار المخرجات
                        print('\n🔴 تم إيقاف السكربت مؤقتاً لتسهيل قراءة التقرير أعلاه.')
                        break
                except Exception as req_err:
                    print('❌ حدث خطأ في الاتصال أثناء النشر: ' + str(req_err))
                    break
                    
                time.sleep(1)

        publish()
        "
