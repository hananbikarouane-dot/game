name: Deploy Products Directly to Blogger API

on:
  push:
    branches:
      - main
  workflow_dispatch: # يتيح لك التشغيل اليدوي بضغطة زر

jobs:
  publish-products:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests

    # تشغيل السكربت الجديد وتمرير الـ API Key و الـ Blog ID بأمان
    - name: Run API Publisher Tool
      env:
        API_KEY: ${{ secrets.BLOGGER_API_KEY }}
        BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
      run: |
        python -c "
        import os
        from publish_to_blogger import publish_to_blogger_api
        publish_to_blogger_api('lap_omega_all_colors.xlsx', os.environ['API_KEY'], os.environ['BLOG_ID'])
        "
