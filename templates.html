<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوالف - لعبة مكالمات الواتساب</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f2f5; padding: 20px; direction: rtl; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: 30px auto; min-height: 150px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; color: #333; }
        button { border: none; padding: 14px 28px; font-size: 18px; border-radius: 25px; cursor: pointer; font-weight: bold; margin: 10px; width: 80%; }
        .btn-next { background: #007bff; color: white; }
        .btn-share { background: #25D366; color: white; display: none; }
        .status { color: #666; font-size: 14px; margin-bottom: 10px; }
    </style>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>🎙️ لعبة سوالف للمكالمات</h1>
        <div class="status" id="status-text">جاري إعداد الغرفة...</div>
        
        <div class="card" id="question-box">قم بدعوة صديقك أولاً لبدء اللعب!</div>
        
        <button class="btn-share" id="share-btn" onclick="shareToWhatsApp()">أرسل الرابط لصديقك على الواتساب 📲</button>
        <button class="btn-next" id="next-btn" onclick="nextQuestion()">السؤال التالي 🎲</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let room = urlParams.get('room');
        const shareBtn = document.getElementById('share-btn');
        const statusText = document.getElementById('status-text');

        // إذا كان المستخدم هو من أنشأ الغرفة
        if (!room) {
            room = 'room_' + Math.random().toString(36).substring(2, 9);
            window.history.pushState({}, '', '?room=' + room);
            shareBtn.style.display = 'inline-block';
            statusText.innerText = "اضغط على الزر الأخضر لإرسال الرابط لصديقك في المكالمة";
        } else {
            statusText.innerText = "أنت متصل الآن في الغرفة المشتركة";
        }

        const socket = io();

        socket.emit('create_or_join', { room: room });

        socket.on('next_question', function(data) {
            document.getElementById('question-box').innerText = data.question;
        });

        function nextQuestion() {
            socket.emit('request_next', { room: room });
        }

        // دالة فتح واتساب وإرسال الرابط تلقائياً
        function shareToWhatsApp() {
            const currentUrl = window.location.href;
            const message = encodeURIComponent("أنا بانتظارك داخل لعبة سوالف الآن لكسر الملل! اضغط على الرابط لنلعب معاً أثناء المكالمة: " + currentUrl);
            window.open("https://api.whatsapp.com/send?text=" + message, '_blank');
        }
    </script>
</body>
</html>
